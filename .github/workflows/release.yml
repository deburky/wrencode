name: build-and-release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: wrencode-linux-x64
          - os: macos-13
            artifact_name: wrencode-macos-x64
          - os: macos-14
            artifact_name: wrencode-macos-arm64
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: python -m pip install --upgrade pip pyinstaller

      - name: Build single-file binary
        run: pyinstaller --onefile --name wrencode wrencode.py

      - name: Rename artifact for platform
        run: mv dist/wrencode dist/${{ matrix.artifact_name }}

      - name: Upload release artifact
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.artifact_name }}
